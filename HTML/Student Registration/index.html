<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="border: 2px solid black; padding: 10px; width: 300px; color: rgb(69, 69, 151);">
    <h1>Student Registration</h1>

    <form action=""style="border: 2px solid black; padding: 10px; width: 250px; background-color: #f0f0f0;background-color:lightpink;">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

         <label for="year">Year of Study:</label>
        <input type="number" id="year" name="year" min="1" max="4"><br><br>

        <label for="department">Department:</label>
        <select id="department" name="department">
            <option value="computer-science">Computer Science</option>
            <option value="information-technology">Information Technology</option>
            <option value="artificial-intelligence">Artificial Intelligence</option>
        </select><br><br>

        <label for="course">Course:</label>
        <select id="course" name="course">
            <option value="web-development">Web Development</option>
            <option value="data-science">Data Science</option>
            <option value="machine-learning">Machine Learning</option>
        </select><br><br>

       

        <input type="submit" value="Register" style="cursor: pointer; background-color: rgb(69, 69, 151); color: white; border: none; padding: 10px 20px; ; border-radius: 5px; margin:auto;justify-content: center; display: block;">
    </form>
</body>
</html>
